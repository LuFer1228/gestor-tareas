{% extends 'base.html' %}
{% block title %}Iniciar Sesión — EduTask{% endblock %}

{% block content %}

<style>
  .login-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url("{{ url_for('static', filename='img/img_1.png') }}") center center / cover no-repeat;
    z-index: -1;
    filter: brightness(0.6);
  }
</style>

<div class="login-bg"></div>

<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow border-0 rounded-4 mt-4" style="background: rgba(255,255,255,0.92);">
      <div class="card-body p-4">

        <h3 class="fw-bold text-center mb-4">
          <i class="bi bi-person-circle text-primary me-2"></i>Iniciar sesión
        </h3>

        <form method="POST" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Correo electrónico</label>
            <input type="email" name="email" class="form-control"
                   placeholder="tu@correo.com" required autofocus/>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required/>
          </div>

          <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
          </button>
        </form>

        <hr class="my-4"/>
        <p class="text-center text-muted small mb-0">
          ¿No tienes cuenta?
          <a href="{{ url_for('registro') }}" class="fw-bold text-primary">Regístrate aquí</a>
        </p>

      </div>
    </div>
  </div>
</div>

{% endblock %}
