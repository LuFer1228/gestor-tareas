{% extends 'base.html' %}
{% block title %}Crear Cuenta — EduTask{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow border-0 rounded-4 mt-4">
      <div class="card-body p-4">

        <h3 class="fw-bold text-center mb-4">
          <i class="bi bi-person-plus-fill text-success me-2"></i>Crear cuenta
        </h3>

        <form method="POST" action="{{ url_for('registro') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre completo</label>
            <input type="text" name="nombre" class="form-control"
                   placeholder="Tu nombre" required autofocus/>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Correo electrónico</label>
            <input type="email" name="email" class="form-control"
                   placeholder="tu@correo.com" required/>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Mínimo 6 caracteres" required minlength="6"/>
          </div>

          <button type="submit" class="btn btn-success w-100 fw-bold py-2">
            <i class="bi bi-check-circle me-2"></i>Crear cuenta
          </button>
        </form>

        <hr class="my-4"/>
        <p class="text-center text-muted small mb-0">
          ¿Ya tienes cuenta?
          <a href="{{ url_for('login') }}" class="fw-bold text-primary">Inicia sesión</a>
        </p>

      </div>
    </div>
  </div>
</div>
{% endblock %}
